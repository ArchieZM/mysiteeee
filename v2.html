<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Владения Мудзана 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;900&family=Noto+Serif+JP:wght@300;600&display=swap" rel="stylesheet">
    <style>
        /* --- CORE SETTINGS --- */
        :root {
            --primary: #8a0303;     /* Кровавый */
            --accent: #d4af37;      /* Золото */
            --dark: #0a0a0a;        /* Тьма */
            --paper: #f0f0f0;       /* Цвет сёдзи */
            --wood: #3b2e2a;        /* Дерево */
        }

        * { box-sizing: border-box; }
        
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: var(--dark);
            overflow: hidden;
            font-family: 'Noto Serif JP', serif;
            color: white;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- BACKGROUND: INFINITY CASTLE VIBE --- */
        .castle-bg {
            position: absolute;
            width: 100%; height: 100%;
            perspective: 1000px;
            z-index: 0;
            overflow: hidden;
            background: radial-gradient(circle at 50% 30%, #220000, #000);
        }

        .floating-room {
            position: absolute;
            background: rgba(40, 10, 10, 0.4);
            border: 1px solid rgba(212, 175, 55, 0.1);
            box-shadow: 0 0 15px rgba(0,0,0,0.8);
            animation: floatRoom 20s infinite ease-in-out;
        }

        @keyframes floatRoom {
            0%, 100% { transform: translateY(0) rotateX(0) rotateY(0); }
            50% { transform: translateY(-20px) rotateX(2deg) rotateY(-2deg); }
        }

        /* Particles Layer */
        #particles {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* --- SHOJI DOORS (ENTRANCE) --- */
        .gate-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1000;
            display: flex;
            transition: transform 1.5s cubic-bezier(0.7, 0, 0.3, 1);
        }

        .gate-panel {
            width: 50%;
            height: 100%;
            background: var(--paper);
            position: relative;
            border: 8px solid var(--wood);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
            transition: transform 1.5s cubic-bezier(0.7, 0, 0.3, 1);
        }

        /* Сетка на дверях */
        .gate-panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(var(--wood) 4px, transparent 4px),
                linear-gradient(90deg, var(--wood) 4px, transparent 4px);
            background-size: 100% 15vh, 25vw 100%; /* Решетка */
            opacity: 0.9;
        }

        .gate-left { border-right: 2px solid var(--wood); transform-origin: left; }
        .gate-right { border-left: 2px solid var(--wood); transform-origin: right; }

        .gate-opened .gate-left { transform: translateX(-100%); }
        .gate-opened .gate-right { transform: translateX(100%); }
        .gate-opened { pointer-events: none; }

        /* Печать Мудзана на дверях */
        .seal {
            position: absolute;
            z-index: 1001;
            width: 120px; height: 120px;
            background: var(--primary);
            border-radius: 50%;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: 'Cinzel', serif;
            font-weight: 900;
            font-size: 2rem;
            border: 4px solid var(--accent);
            box-shadow: 0 0 20px var(--primary);
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .seal:hover { transform: translate(-50%, -50%) scale(1.1); box-shadow: 0 0 40px var(--primary); }
        .seal span { font-size: 0.8rem; display: block; font-weight: normal; }

        .gate-opened .seal { opacity: 0; transform: translate(-50%, -50%) scale(3); transition: 0.5s; }

        /* --- MAIN CONTENT --- */
        .content-wrapper {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 90%; max-width: 600px;
            z-index: 10;
            opacity: 0;
            transition: opacity 2s 1s; /* Появится после открытия дверей */
        }

        .card {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 0, 0, 0.3);
            border-top: 4px solid var(--primary);
            padding: 30px 20px;
            text-align: center;
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
        }

        /* Декор паучьей лилии */
        .flower-icon {
            font-size: 3rem;
            color: var(--primary);
            text-shadow: 0 0 10px var(--primary);
            margin-bottom: 10px;
            animation: pulse 3s infinite;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(2.5rem, 8vw, 4rem);
            margin: 0;
            background: linear-gradient(to bottom, #fff, #999);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 5px;
        }

        h2 {
            font-size: 1rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: -5px;
            margin-bottom: 30px;
        }

        .typewriter {
            min-height: 80px;
            font-size: 1.1rem;
            line-height: 1.6;
            color: #ddd;
            margin-bottom: 30px;
            font-style: italic;
        }

        /* Кнопка */
        .btn {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 12px 35px;
            font-size: 1rem;
            font-family: 'Cinzel', serif;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
        }

        .btn::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 0%;
            background: var(--primary);
            transition: 0.3s;
            z-index: -1;
        }

        .btn:hover, .btn:active {
            color: white;
            border-color: var(--primary);
            box-shadow: 0 0 20px var(--primary);
        }
        
        .btn:hover::after, .btn:active::after {
            height: 100%;
        }

        /* Финальный эффект */
        .overlay-flash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: red;
            opacity: 0;
            pointer-events: none;
            z-index: 2000;
            mix-blend-mode: overlay;
        }

        .veins {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 50%, rgba(138, 3, 3, 0.8) 100%);
            opacity: 0;
            pointer-events: none;
            z-index: 1999;
            transition: opacity 2s;
        }

        @keyframes pulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 5px var(--primary)); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 15px red); }
            100% { transform: scale(1); filter: drop-shadow(0 0 5px var(--primary)); }
        }

        /* Для мобилок */
        @media (max-width: 600px) {
            .gate-panel::before { background-size: 100% 10vh, 25vw 100%; } /* Чаще решетка */
            .card { padding: 20px 15px; width: 95%; }
            .seal { width: 100px; height: 100px; font-size: 1.5rem; }
        }

    </style>
</head>
<body>

    <!-- Аудио (Скрыто, для атмосферы лучше включить мысленно звук бивы) -->

    <!-- Врата -->
    <div class="gate-container" id="gate">
        <div class="gate-panel gate-left"></div>
        <div class="gate-panel gate-right"></div>
        <div class="seal" onclick="enterDomain()">
            <div>OPEN<br><span>2026</span></div>
        </div>
    </div>

    <!-- Фон: Бесконечная крепость -->
    <div class="castle-bg" id="castleBg">
        <!-- Скрипт создаст блоки -->
    </div>
    <canvas id="particles"></canvas>
    
    <div class="veins" id="veins"></div>
    <div class="overlay-flash" id="flash"></div>

    <!-- Контент -->
    <div class="content-wrapper" id="content">
        <div class="card">
            <div class="flower-icon">🎴</div>
            <h1>2026</h1>
            <h2>Kibutsuji's Order</h2>
            
            <div class="typewriter" id="text-area"></div>

            <button class="btn" onclick="pledgeLoyalty()">Поклясться</button>
        </div>
        <div style="margin-top: 20px; font-size: 0.8rem; color: #555; text-align: center;">
            KRD Flood | Owner: Muzan
        </div>
    </div>

    <script>
        // --- ГЕНЕРАЦИЯ ФОНА (БЛОКИ КРЕПОСТИ) ---
        const castleBg = document.getElementById('castleBg');
        for(let i=0; i<8; i++) {
            let room = document.createElement('div');
            room.classList.add('floating-room');
            // Случайные размеры и позиции
            let w = 100 + Math.random() * 300;
            let h = 100 + Math.random() * 200;
            room.style.width = w + 'px';
            room.style.height = h + 'px';
            room.style.left = (Math.random() * 100) + '%';
            room.style.top = (Math.random() * 100) + '%';
            room.style.animationDuration = (15 + Math.random() * 20) + 's';
            room.style.opacity = Math.random() * 0.5;
            castleBg.appendChild(room);
        }

        // --- ЛОГИКА ОТКРЫТИЯ ---
        function enterDomain() {
            // Звук Бивы (визуально) - экран дергается
            document.body.style.transform = "scale(1.02)";
            setTimeout(() => document.body.style.transform = "scale(1)", 150);

            document.getElementById('gate').classList.add('gate-opened');
            
            // Показываем контент
            setTimeout(() => {
                document.getElementById('content').style.opacity = '1';
                typeText(); // Запуск печати текста
            }, 800);
        }

        // --- ПЕЧАТНАЯ МАШИНКА ---
        const text = "Еще один год прошел впустую для истребителей. Выжили лишь те, кому я позволил. В 2026 году будьте полезны... или станьте пылью.";
        const textArea = document.getElementById('text-area');
        let index = 0;

        function typeText() {
            if (index < text.length) {
                textArea.innerHTML += text.charAt(index);
                index++;
                setTimeout(typeText, 40); // Скорость печати
            }
        }

        // --- ИНТЕРАКТИВ КНОПКИ ---
        function pledgeLoyalty() {
            const btn = document.querySelector('.btn');
            const flash = document.getElementById('flash');
            const veins = document.getElementById('veins');
            const card = document.querySelector('.card');

            btn.innerHTML = "ПРИНЯТО";
            btn.style.borderColor = "red";
            btn.style.color = "red";
            
            // Эффект крови
            flash.style.transition = 'opacity 0.1s';
            flash.style.opacity = '0.8';
            setTimeout(() => flash.style.opacity = '0', 200);

            veins.style.opacity = '1';

            // Изменение текста
            setTimeout(() => {
                textArea.innerHTML = "<span style='color:#ff4d4d; font-weight:bold; font-size:1.3rem'>Теперь моя кровь течет в тебе.</span>";
                card.style.borderTopColor = "#ff0000";
                card.style.boxShadow = "0 0 50px rgba(255,0,0,0.4)";
            }, 500);
        }

        // --- ЧАСТИЦЫ (КРОВАВЫЕ ИСКРЫ) ---
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let width, height;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let particles = [];
        class P {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * width;
                this.y = height + Math.random() * 100;
                this.speed = 1 + Math.random() * 3;
                this.size = Math.random() * 3;
                this.alpha = 1;
            }
            update() {
                this.y -= this.speed;
                this.alpha -= 0.005;
                if (this.y < 0 || this.alpha <= 0) this.reset();
            }
            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = '#ff0000';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for(let k=0; k<50; k++) particles.push(new P());

        function animate() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();

    </script>
</body>
</html>
